<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="r">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>
  <!-- Blue base -->
  <rect width="512" height="512" rx="112" fill="#2B5CE6"/>
  <!-- Red diagonal half (top-left) -->
  <polygon points="0,0 512,0 0,512" fill="#CC0000" clip-path="url(#r)"/>
  <!-- White U -->
  <text x="256" y="360" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="290" text-anchor="middle" fill="white">U</text>
</svg>
